<!-- Not logged in: Landing or Auth -->
@if (!currentUser()) {
  @if (!showAuth()) {
    <app-landing-page (getStarted)="showAuth.set(true)"></app-landing-page>
  } @else {
    <app-auth-page
      (authSuccess)="handleAuthSuccess($event)"
      (backToHome)="showAuth.set(false)">
    </app-auth-page>
  }
} @else {
  <!-- Main Dashboard -->
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="brand-section">
        <div class="brand-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
        </div>
        <div>
          <h1 class="brand-name">FinVertex</h1>
          <span style="font-size:0.7rem;color:var(--text-muted);">Transaction Categorizer &amp; Insights Engine</span>
        </div>
      </div>

      <div class="header-actions">
        <div style="display:flex;align-items:center;gap:0.5rem;background:rgba(255,255,255,0.03);border:1px solid var(--border-color);padding:0.5rem 0.75rem;border-radius:8px;font-size:0.8rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="22" y2="11"/><line x1="10" x2="10" y1="22" y2="11"/><line x1="14" x2="14" y1="22" y2="11"/><line x1="18" x2="18" y1="22" y2="11"/><polyline points="2 11 12 2 22 11"/></svg>
          <span style="color:var(--text-secondary);">DB Connection: </span>
          <span style="color:var(--color-success);font-weight:700;">Active</span>
        </div>
        <button (click)="loadTransactions()" class="btn btn-secondary btn-icon" title="Refresh Feed" [disabled]="isLoading()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            [style.animation]="isLoading() ? 'spin 1s linear infinite' : 'none'"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        </button>
        <app-account-menu
          [linkedBanks]="linkedBanks()"
          [isLoadingBanks]="isLoadingBanks()"
          [currentUser]="currentUser()"
          [theme]="theme()"
          (openPlaid)="isPlaidOpen.set(true)"
          (unlinkBank)="handleUnlinkBank($event)"
          (deleteAccount)="handleDeleteAccount()"
          (logout)="handleLogout()"
          (themeChange)="theme.set($event)">
        </app-account-menu>
      </div>
    </header>

    <!-- Sync Banner -->
    @if (syncMessage()) {
      <div class="card" style="margin-bottom:1.5rem;background:linear-gradient(135deg,rgba(20,184,166,0.1),rgba(99,102,241,0.05));border-color:rgba(20,184,166,0.3);display:flex;align-items:center;gap:0.75rem;padding:1rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="22" y2="11"/><line x1="10" x2="10" y1="22" y2="11"/><line x1="14" x2="14" y1="22" y2="11"/><line x1="18" x2="18" y1="22" y2="11"/><polyline points="2 11 12 2 22 11"/></svg>
        <span style="font-size:0.9rem;font-weight:600;">{{ syncMessage() }}</span>
      </div>
    }

    <!-- Dashboard Grid -->
    <main class="dashboard-grid">
      <!-- Left: Stats + Transactions -->
      <div style="display:flex;flex-direction:column;gap:1.5rem;">
        <app-dashboard [transactions]="transactions()" [linkedBanks]="linkedBanks()"></app-dashboard>
        <app-transaction-list
          [transactions]="transactions()"
          [filters]="filters()"
          [linkedBanks]="linkedBanks()"
          (filtersChange)="onFiltersChange($event)"
          (refresh)="loadTransactions()"
          (openPlaid)="isPlaidOpen.set(true)">
        </app-transaction-list>
      </div>

      <!-- Right: Chat Assistant -->
      <div [class]="'chat-sidebar-column ' + (isChatMobileOpen() ? 'mobile-open' : '')">
        <app-chat-assistant (closeChat)="isChatMobileOpen.set(false)"></app-chat-assistant>
      </div>
    </main>

    <!-- Floating Mobile Chat Button -->
    <button class="floating-chat-btn" (click)="toggleChat()" title="Chat with AI">
      @if (isChatMobileOpen()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      }
    </button>

    <!-- Plaid Modal -->
    <app-plaid-sandbox
      [isOpen]="isPlaidOpen()"
      (closeModal)="isPlaidOpen.set(false)"
      (success)="handlePlaidSuccess($event)">
    </app-plaid-sandbox>

  </div>
}
